publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_sound: ^9.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
